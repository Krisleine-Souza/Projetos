<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Projetos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #b8c2d9;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    a.card {
      display: block;
      padding: 24px;
      border-radius: 18px;
      background: #131d33;
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.2s ease;
    }

    a.card:hover {
      transform: translateY(-4px);
      border-color: #4fd1ff;
    }

    .label {
      font-size: 0.9rem;
      color: #7ddfff;
      margin-bottom: 8px;
      display: block;
    }

    .title {
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Meus projetos</h1>
    <p>Selecione um modelo para visualizar.</p>

    <div class="grid">
      <a class="card" href="./modelo-barbearia/">
        <span class="label">Projeto</span>
        <span class="title">Modelo Barbearia</span>
      </a>

      <a class="card" href="./modelo-distribuidoraDeBebidas/">
        <span class="label">Projeto</span>
        <span class="title">Modelo Distribuidora de Bebidas</span>
      </a>

      <a class="card" href="./modelo-mecanica/">
        <span class="label">Projeto</span>
        <span class="title">Modelo Mecânica</span>
      </a>

      <a class="card" href="./modelo-restaurante/">
        <span class="label">Projeto</span>
        <span class="title">Modelo Restaurante</span>
      </a>
    </div>
  </div>
</body>
</html>
